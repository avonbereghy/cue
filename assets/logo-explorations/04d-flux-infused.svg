  <!-- 04d · Flux-Infused Gauge ─ the wave fill is alive, carrying the curl
       streamline field inside it. Ties the gauge back to the parallax-wave
       concept and signals "this isn't just a progress bar." -->
  <defs>
    <linearGradient id="bg4d" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b1820"/>
      <stop offset="1" stop-color="#0f0e14"/>
    </linearGradient>
    <linearGradient id="bar4d" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4b4558"/>
      <stop offset="1" stop-color="#2b2834"/>
    </linearGradient>
    <linearGradient id="fill4d" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9673f0"/>
      <stop offset="1" stop-color="#7a5ed8"/>
    </linearGradient>
    <clipPath id="waveClip4d">
      <path d="M 416 256
               C 400 234, 372 234, 356 256
               S 316 278, 300 256
               S 260 234, 244 256
               S 204 278, 188 256
               L 188 312 L 416 312 Z"/>
    </clipPath>
    <clipPath id="barClip4d">
      <rect x="96" y="228" width="320" height="56" rx="28"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg4d)"/>

