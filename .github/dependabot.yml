# Dependabot configuration. Daily checks on Cargo + npm, plus the GitHub
# Actions ecosystem so workflow steps stay current.
#
# Two `ignore` entries below correspond to dismissed Dependabot alerts:
#   - rand 0.7.x (RUSTSEC-2026-0097, GHSA-cq8v-f236-94qc) — Tauri build-dep
#     chain locks rand "0.7"; advisory only triggers via custom log handlers
#     calling rand::rng(), which the chain does not use.
#   - glib < 0.20 (RUSTSEC-2024-0429, GHSA-wrw7-89jp-8q8g) — Tauri's GTK stack
#     uses gtk-rs 0.18; advisory affects VariantStrIter on non-UTF-8 input
#     paths Tauri does not exercise.
# Re-evaluate both when Tauri bumps to the next major.

version: 2
updates:
  - package-ecosystem: cargo
    directory: /cue-desktop/src-tauri
    schedule:
      interval: daily
    ignore:
      - dependency-name: rand
        versions: ['0.7.x']
      - dependency-name: glib
        versions: ['<0.20']

  - package-ecosystem: npm
    directory: /cue-desktop
    schedule:
      interval: daily

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
