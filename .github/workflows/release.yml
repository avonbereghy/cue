# Release pipeline: builds Cue for macOS (Apple Silicon + Intel), Windows,
# and Linux on every `v*` tag push, signs/notarizes per platform, generates
# Tauri updater artifacts, and uploads everything to a GitHub Release.
#
# Required repository secrets (configure in GitHub Settings → Secrets):
#   APPLE_CERTIFICATE              — base64 of Developer ID Application .p12
#   APPLE_CERTIFICATE_PASSWORD     — password for the .p12
#   APPLE_SIGNING_IDENTITY         — e.g. "Developer ID Application: Foo Bar (TEAMID)"
#   APPLE_ID                       — Apple ID email
#   APPLE_PASSWORD                 — app-specific password (notarytool)
#   APPLE_TEAM_ID                  — 10-char team id
#   WINDOWS_CERTIFICATE            — base64 of code-signing .pfx
#   WINDOWS_CERTIFICATE_PASSWORD   — password for the .pfx
#   TAURI_SIGNING_PRIVATE_KEY      — Tauri updater private key (`tauri signer generate`)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — password for the Tauri signing key
#
# Trigger: push a tag `vX.Y.Z` (must match package.json/Cargo.toml/tauri.conf.json
# version). The workflow creates a draft release; review it, then publish manually.
#
# Supply-chain hardening (FIND-006): every third-party action is pinned to a
# commit SHA. The trailing comment records the human-readable tag the SHA
# corresponds to. The release pipeline holds APPLE_CERTIFICATE,
# WINDOWS_CERTIFICATE, and TAURI_SIGNING_PRIVATE_KEY — a maintainer-account
# compromise that retags an existing version would otherwise inject code
# into signed builds. Bump both the SHA and the trailing tag together; do
# not just chase a floating tag.
name: release

on:
  push:
    tags:
      - 'v*'

# Least-privilege default for the whole workflow; jobs elevate only what they need.
permissions:
  contents: read

jobs:
  publish:
    permissions:
      contents: write # create/upload the release
      id-token: write # mint the Sigstore OIDC token for build provenance
      attestations: write # persist the provenance attestation
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: '--target aarch64-apple-darwin'
          - platform: macos-14
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch tip
        with:
          targets: ${{ matrix.platform == 'macos-14' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: cue-desktop/src-tauri -> target

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cue-desktop/package-lock.json

      - name: Install npm deps
        working-directory: cue-desktop
        run: npm ci

      - name: Build & publish (Tauri Action)
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # App code-signing is intentionally OFF for now — builds ship unsigned
          # (see README / INSTALL.md for the macOS Gatekeeper + Windows SmartScreen
          # steps). Passing empty APPLE_*/WINDOWS_* secrets makes tauri-action
          # attempt — and fail — a certificate import, so they are omitted entirely.
          # To enable signing later, add the certs as repo secrets and restore the
          # APPLE_*/WINDOWS_* env vars here.
          #
          # The updater key IS set, so auto-update artifacts are still signed:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: cue-desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'Cue ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install. Auto-update will pull this release on next launch for already-installed users.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          # latest.json is the manifest tauri-plugin-updater fetches; the
          # action generates and uploads it alongside the bundles.
          updaterJsonPreferNsis: true

      # Cryptographic build provenance (SLSA Build L2) via Sigstore. Public repos
      # use the Sigstore public-good transparency log; consumers verify with
      # `gh attestation verify <file> --repo avonbereghy/cue`. This is the trust
      # signal that compensates for unsigned binaries. UNTESTED until a real
      # release tag is pushed — confirm the bundle globs match on the first run.
      - name: Attest build provenance
        # Non-fatal on the first run: if a bundle glob doesn't match on some
        # platform, the release still succeeds and we fix the globs from the run
        # logs. Tighten to required once verified.
        continue-on-error: true
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: |
            cue-desktop/src-tauri/target/**/release/bundle/dmg/*.dmg
            cue-desktop/src-tauri/target/**/release/bundle/macos/*.app.tar.gz
            cue-desktop/src-tauri/target/**/release/bundle/msi/*.msi
            cue-desktop/src-tauri/target/**/release/bundle/nsis/*.exe
            cue-desktop/src-tauri/target/**/release/bundle/appimage/*.AppImage
            cue-desktop/src-tauri/target/**/release/bundle/deb/*.deb

  # After every platform bundle is uploaded to the draft release, hash them all
  # and publish a SHA256SUMS file so users can verify downloads. UNTESTED until a
  # real release runs.
  checksums:
    needs: publish
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Generate and upload SHA256SUMS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"
          tmp="$(mktemp -d)"; cd "$tmp"
          gh release download "$tag" -R "${{ github.repository }}" --pattern '*' --skip-existing || true
          if [ -n "$(ls -A .)" ]; then
            sha256sum * > SHA256SUMS
            gh release upload "$tag" SHA256SUMS -R "${{ github.repository }}" --clobber
          else
            echo "No assets found to checksum (draft may be empty)"
          fi
