# OpenSSF Scorecard — supply-chain posture score, published to the Security tab
# and to the public Scorecard API. Free only on PUBLIC repos, so the job is gated
# on visibility and simply skips (never fails) while the repo is private. After
# going public it runs weekly, on pushes to main, and on demand.
#
# Actions pinned to commit SHAs (FIND-006); trailing comment is the tag.
name: scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: '21 5 * * 2' # Tuesdays 05:21 UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    if: ${{ github.event.repository.private == false }}
    runs-on: ubuntu-22.04
    permissions:
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5
      - uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v3
        with:
          sarif_file: results.sarif
