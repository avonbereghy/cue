# Dependency Review — flags pull requests that introduce known-vulnerable
# dependencies. Needs the dependency graph (free on public repos; GHAS on
# private), so the job is gated on visibility and skips (never fails) while
# private.
#
# Actions pinned to commit SHAs (FIND-006); trailing comment is the tag.
name: dependency-review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  review:
    name: Dependency review
    if: ${{ github.event.repository.private == false }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          fail-on-severity: high
