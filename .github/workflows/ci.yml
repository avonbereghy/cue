# PR/push verification: typecheck, lint, and unit tests on every push.
# Does not produce build artifacts — see release.yml for that.
#
# Third-party actions are pinned to commit SHAs (FIND-006). The trailing
# comment records the human-readable tag the SHA corresponds to so
# `dependabot`/manual review can recognise version bumps without diffing
# action behaviour. Bump both fields together.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default: the GITHUB_TOKEN gets read-only access. CI needs
# nothing more (no writes to the repo, releases, or checks).
permissions:
  contents: read

jobs:
  rust:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch tip
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: cue-desktop/src-tauri -> target
      - name: cargo fmt
        working-directory: cue-desktop/src-tauri
        run: cargo fmt --check
      - name: cargo clippy
        working-directory: cue-desktop/src-tauri
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo test
        working-directory: cue-desktop/src-tauri
        run: cargo test

  frontend:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cue-desktop/package-lock.json
      - name: Install
        working-directory: cue-desktop
        run: npm ci
      - name: Typecheck
        working-directory: cue-desktop
        run: npx tsc --noEmit
      - name: Build
        working-directory: cue-desktop
        run: npm run build
      - name: Test
        working-directory: cue-desktop
        run: npm test

  # The Python hook is the canonical writer of sessions.json and the single
  # most behaviorally-subtle component in the project. Its ~1,350-line suite
  # must gate merges, not sit dormant.
  hooks:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
      - name: Install test deps
        run: python -m pip install -r tests/hooks/requirements.txt
      - name: pytest (cue-hook)
        run: python -m pytest tests/hooks -q
