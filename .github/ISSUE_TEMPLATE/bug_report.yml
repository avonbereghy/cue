name: Bug report
description: Something in Cue isn't working as expected
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please fill in the fields below so it can be
        reproduced. **Do not paste the contents of `~/.claude/settings.json` or
        your transcripts** — redact first.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What Cue showed versus what you expected.
      placeholder: "Cue showed the session as idle, but Claude was still working."
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: cue-version
    attributes:
      label: Cue version
      description: "Settings → About, or the release tag."
      placeholder: "0.2.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true
  - type: input
    id: os-version
    attributes:
      label: OS version
      placeholder: "macOS 14.5 / Windows 11 23H2 / Ubuntu 24.04"
    validations:
      required: true
  - type: input
    id: claude-version
    attributes:
      label: Claude Code version
      description: "Output of `claude --version`."
      placeholder: "1.x.x"
    validations:
      required: true
  - type: dropdown
    id: install-method
    attributes:
      label: Install method
      options:
        - Release installer
        - Built from source
    validations:
      required: true
  - type: dropdown
    id: session-state
    attributes:
      label: Session state (if relevant)
      description: What state was the session in when the bug occurred?
      options:
        - Not relevant
        - working
        - thinking
        - waiting
        - subagent
        - compacting
        - error
        - done
        - idle
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: >
        Attach a screenshot for display issues. Cue stores no logs by default; if
        you ran it from a terminal, paste any relevant output (redacted).
    validations:
      required: false
