  <circle cx="160" cy="160" r="28" fill="#FFFFFF"/>
  <circle cx="256" cy="160" r="28" fill="#FFD60A"/>
  <circle cx="352" cy="160" r="28" fill="#64D2FF"/>

  <!-- Row 2 -->
  <circle cx="160" cy="256" r="28" fill="#30D158"/>
  <circle cx="256" cy="256" r="28" fill="#FFFFFF"/>
  <circle cx="352" cy="256" r="28" fill="#FFD60A"/>

  <!-- Row 3 -->
  <circle cx="160" cy="352" r="28" fill="#64D2FF"/>
  <circle cx="256" cy="352" r="28" fill="#30D158"/>
  <circle cx="352" cy="352" r="28" fill="#FFFFFF"/>
</svg>
